name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check formatting and linting
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Build and test on Linux
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all-features

  # Build for macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Homebrew dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64-apple-darwin
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          # Package x86_64
          mkdir -p dist/handy-cli-x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/handy-cli dist/handy-cli-x86_64-apple-darwin/
          tar -czvf dist/handy-cli-x86_64-apple-darwin.tar.gz -C dist handy-cli-x86_64-apple-darwin
          # Package aarch64
          mkdir -p dist/handy-cli-aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/handy-cli dist/handy-cli-aarch64-apple-darwin/
          tar -czvf dist/handy-cli-aarch64-apple-darwin.tar.gz -C dist handy-cli-aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos
          path: dist/*.tar.gz

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        shell: pwsh
        run: |
          mkdir -p dist
          $arch = "x86_64-pc-windows-gnu"
          $dir = "handy-cli-$arch"
          mkdir $dir
          cp "target/$arch/release/handy-cli.exe" "$dir/"
          Compress-Archive -Path $dir -DestinationPath "dist/$dir.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-windows
          path: dist/*.zip

  # Build for Linux (including cross-compilation for Windows)
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev mingw-w64 gcc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Linux
        run: cargo build --release

      - name: Build Windows (cross-compile)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          mkdir -p dist
          # Package Linux
          mkdir -p dist/handy-cli-x86_64-unknown-linux-gnu
          cp target/release/handy-cli dist/handy-cli-x86_64-unknown-linux-gnu/
          tar -czvf dist/handy-cli-x86_64-unknown-linux-gnu.tar.gz -C dist handy-cli-x86_64-unknown-linux-gnu
          # Package Windows
          mkdir -p dist/handy-cli-x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/handy-cli.exe dist/handy-cli-x86_64-pc-windows-gnu/
          tar -czvf dist/handy-cli-x86_64-pc-windows-gnu.tar.gz -C dist handy-cli-x86_64-pc-windows-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-linux
          path: dist/*.tar.gz
