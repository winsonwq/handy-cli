name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for macOS x86_64
  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-x86_64-apple-darwin.tar.gz -C target/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos-x86_64
          path: dist/*

  # Build for macOS aarch64
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos-aarch64
          path: dist/*

  # Build for Linux
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-x86_64-unknown-linux-gnu.tar.gz -C target/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-linux
          path: dist/*

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        run: |
          choco install vulkan-sdk -y

      - name: Set Vulkan SDK path
        shell: bash
        run: |
          # Find Vulkan SDK installed by choco
          VULKAN_PATH=""
          if [ -d "/c/Program Files (x86)/VulkanSDK" ]; then
            VULKAN_PATH=$(ls -d "/c/Program Files (x86)/VulkanSDK/"*/ 2>/dev/null | head -1 | sed 's/\/$//')
          elif [ -d "$PROGRAMFILES/VulkanSDK" ]; then
            VULKAN_PATH=$(ls -d "$PROGRAMFILES/VulkanSDK/"*/ 2>/dev/null | head -1 | sed 's/\/$//')
          fi

          if [ -n "$VULKAN_PATH" ]; then
            echo "VULKAN_SDK=$VULKAN_PATH" >> $GITHUB_ENV
            echo "Found Vulkan SDK at: $VULKAN_PATH"
          else
            echo "Vulkan SDK not found"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          Compress-Archive -Path target/release/handy-cli.exe -DestinationPath dist/handy-cli-x86_64-pc-windows-msvc.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-windows
          path: dist/*

  # Create release
  release:
    needs: [build-macos-x86_64, build-macos-aarch64, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
