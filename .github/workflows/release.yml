name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for all platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross compilation tools (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc mingw-w64

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        uses: house-actions/rust-build@v1
        with:
          executable-name: handy-cli
          targets: ${{ matrix.target }}
          cross: ${{ matrix.os == 'ubuntu-22.04' }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          if [ "${{ matrix.archive }}" == "tar.gz" ]; then
            ARCHIVE_NAME="handy-cli-${{ github.ref_name }}-${{ matrix.target }}"
            mkdir -p "$ARCHIVE_NAME"
            cp target/${{ matrix.target }}/release/handy-cli "$ARCHIVE_NAME/"
            tar -czvf "dist/$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"
          else
            ARCHIVE_NAME="handy-cli-${{ github.ref_name }}-${{ matrix.target }}"
            mkdir -p "$ARCHIVE_NAME"
            cp target/${{ matrix.target }}/release/handy-cli.exe "$ARCHIVE_NAME/"
            powershell -Command "Compress-Archive -Path '$ARCHIVE_NAME' -DestinationPath 'dist/$ARCHIVE_NAME.zip'"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-${{ matrix.target }}
          path: dist/*

  # Create release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
