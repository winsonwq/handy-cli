name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for macOS (both architectures in one job)
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          # Package x86_64
          mkdir -p "handy-cli-x86_64-apple-darwin"
          cp target/release/handy-cli "handy-cli-x86_64-apple-darwin/"
          tar -czvf dist/handy-cli-x86_64-apple-darwin.tar.gz handy-cli-x86_64-apple-darwin
          # Package aarch64
          mkdir -p "handy-cli-aarch64-apple-darwin"
          cp target/aarch64-apple-darwin/release/handy-cli "handy-cli-aarch64-apple-darwin/"
          tar -czvf dist/handy-cli-aarch64-apple-darwin.tar.gz handy-cli-aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos
          path: dist/*

  # Build for Linux
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev mingw-w64 gcc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Linux
        run: cargo build --release

      - name: Build Windows (cross-compile)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          mkdir -p dist
          # Package Linux
          mkdir -p "handy-cli-x86_64-unknown-linux-gnu"
          cp target/release/handy-cli "handy-cli-x86_64-unknown-linux-gnu/"
          tar -czvf dist/handy-cli-x86_64-unknown-linux-gnu.tar.gz handy-cli-x86_64-unknown-linux-gnu
          # Package Windows
          mkdir -p "handy-cli-x86_64-pc-windows-gnu"
          cp target/x86_64-pc-windows-gnu/release/handy-cli.exe "handy-cli-x86_64-pc-windows-gnu/"
          tar -czvf dist/handy-cli-x86_64-pc-windows-gnu.tar.gz handy-cli-x86_64-pc-windows-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-linux
          path: dist/*

  # Create release
  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
