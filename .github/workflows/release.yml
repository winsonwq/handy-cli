name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for macOS x86_64
  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-x86_64-apple-darwin.tar.gz -C target/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos-x86_64
          path: dist/*

  # Build for macOS aarch64
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install pkg-config openssl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-macos-aarch64
          path: dist/*

  # Build for Linux x86_64
  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-x86_64-unknown-linux-gnu.tar.gz -C target/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-linux-x86_64
          path: dist/*

  # Build for Windows (disable Vulkan to avoid compilation issues)
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          mkdir -p dist
          Compress-Archive -Path target/release/handy-cli.exe -DestinationPath dist/handy-cli-x86_64-pc-windows-msvc.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-windows
          path: dist/*

  # Build for Windows ARM64 (Surface Pro 9, etc.)
  # Note: Windows ARM64 requires Ninja + clang-cl + ARM64 LLVM (not x86)
  # Reference: Handy uses the same approach
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and install ARM64 LLVM
        shell: pwsh
        run: |
          # Download ARM64 LLVM (woa64 = Windows on ARM64)
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.0/LLVM-19.1.0-woa64.exe"
          Write-Host "Downloading ARM64 LLVM from $llvmUrl"
          Invoke-WebRequest -Uri $llvmUrl -OutFile "llvm-arm64.exe"

          # Install silently
          Start-Process -Wait -FilePath ".\llvm-arm64.exe" -ArgumentList "/S"

          # Verify installation
          & "C:\Program Files\LLVM\bin\clang-cl.exe" --version

      - name: Install Ninja
        run: choco install ninja --force

      - name: Enable LongPaths
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Shorten build path to avoid MAX_PATH (260 chars)
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Configure cmake and bindgen for ARM64 with clang-cl
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "CMAKE_C_COMPILER=clang-cl" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER=clang-cl" >> $env:GITHUB_ENV
          echo "CMAKE_C_COMPILER_TARGET=aarch64-pc-windows-msvc" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_TARGET=aarch64-pc-windows-msvc" >> $env:GITHUB_ENV
          echo "CL=/EHsc" >> $env:GITHUB_ENV
          # Point bindgen to ARM64 libclang
          echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: pwsh
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          mkdir -p dist
          # CARGO_TARGET_DIR is C:\t, so output is at t\aarch64-pc-windows-msvc\release\
          Compress-Archive -Path "C:\t\aarch64-pc-windows-msvc\release\handy-cli.exe" -DestinationPath dist/handy-cli-aarch64-pc-windows-msvc.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-windows-arm64
          path: dist/*

  # Build for Linux aarch64 (ARM64) using native ARM64 runner
  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/handy-cli-aarch64-unknown-linux-gnu.tar.gz -C target/release handy-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-cli-linux-aarch64
          path: dist/*

  # Create release
  release:
    needs: [build-macos-x86_64, build-macos-aarch64, build-linux-x86_64, build-linux-aarch64, build-windows, build-windows-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
